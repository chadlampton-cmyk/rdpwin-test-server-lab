---
name: tfsec

'on':
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/tfsec.yml"
  workflow_dispatch: {}

jobs:
  tfsec:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
